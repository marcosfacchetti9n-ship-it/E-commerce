services:
  - type: web
    name: northstar-shop-api
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://ep-empty-glade-amxruy3s-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
  - type: static
    name: northstar-shop-web
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
